    <!-- Glow filter -->
    <filter id="radiantGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Top-Left: LIVE / SPRING -->
    <linearGradient id="gradTL" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2bd4e1" />
      <stop offset="100%" stop-color="#4cdd86" />
    </linearGradient>

    <!-- Top-Right: CONVENTIONS / AUTUMN -->
