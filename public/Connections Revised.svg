      <stop offset="0%" stop-color="#b4c7fa" />
      <stop offset="100%" stop-color="#507bf2" />
    </linearGradient>

    <!-- Bottom-Left: SOCIAL / SUMMER -->
    <linearGradient id="gradBL" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c20460" />
      <stop offset="100%" stop-color="#d957f7" />
    </linearGradient>
